# Production compose: uses pre-built images from GHCR.
# Built by .github/workflows/ci.yml on every push to main.
# Override registry/tag via environment variables if needed.

services:

  # ── PostgreSQL ────────────────────────────────────────────────────────────
  db:
    image: postgres:18-alpine
    container_name: easm-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: easm
      POSTGRES_PASSWORD: ${EASM_DB_PASSWORD:?EASM_DB_PASSWORD is required}
      POSTGRES_DB: easm
    volumes:
      - easm-db:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U easm -d easm"]
      interval: 5s
      timeout: 3s
      retries: 12
    networks:
      - easm

  # ── Redis (Scan-Queue) ────────────────────────────────────────────────────
  redis:
    image: redis:8-alpine
    container_name: easm-redis
    restart: unless-stopped
    volumes:
      - easm-redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 12
    networks:
      - easm

  # ── FastAPI Backend ──────────────────────────────────────────────────────
  backend:
    image: ${EASM_IMAGE_REGISTRY:-ghcr.io}/${EASM_IMAGE_REPO:-mainzerp/easm}-backend:${EASM_IMAGE_TAG:-latest}
    container_name: easm-backend
    restart: unless-stopped
    pull_policy: always
    volumes:
      - easm-results:/results
      - easm-data:/data
      - ./scripts:/scripts:ro
    environment:
      - PYTHONUNBUFFERED=1
      - TZ=${TZ:-UTC}
      - DATABASE_URL=postgresql+psycopg://easm:${EASM_DB_PASSWORD}@db:5432/easm
      - REDIS_URL=redis://redis:6379/0
      - EASM_ADMIN_PASSWORD=${EASM_ADMIN_PASSWORD:-}
      - EASM_ADMIN_PASSWORD_HASH=${EASM_ADMIN_PASSWORD_HASH:-}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/auth/check"]
      interval: 5s
      timeout: 3s
      retries: 20
    networks:
      - easm
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ── Scan Worker (RQ) ──────────────────────────────────────────────────────
  worker:
    image: ${EASM_IMAGE_REGISTRY:-ghcr.io}/${EASM_IMAGE_REPO:-mainzerp/easm}-backend:${EASM_IMAGE_TAG:-latest}
    container_name: easm-worker
    restart: unless-stopped
    pull_policy: always
    command: rq worker-pool easm-scans --num-workers 2 --url redis://redis:6379/0
    volumes:
      - easm-results:/results
      - easm-data:/data
      - ./scripts:/scripts:ro
    environment:
      - PYTHONUNBUFFERED=1
      - TZ=${TZ:-UTC}
      - DATABASE_URL=postgresql+psycopg://easm:${EASM_DB_PASSWORD}@db:5432/easm
      - REDIS_URL=redis://redis:6379/0
    networks:
      - easm
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    mem_limit: 2g
    cpus: 1.5

  # ── React Frontend via nginx ─────────────────────────────────────────────
  frontend:
    image: ${EASM_IMAGE_REGISTRY:-ghcr.io}/${EASM_IMAGE_REPO:-mainzerp/easm}-frontend:${EASM_IMAGE_TAG:-latest}
    container_name: easm-frontend
    restart: unless-stopped
    pull_policy: always
    volumes:
      - easm-tls:/etc/nginx/tls
    environment:
      - EASM_TLS=${EASM_TLS:-on}
      - EASM_TLS_SAN=${EASM_TLS_SAN:-}
      - EASM_HSTS=${EASM_HSTS:-off}
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - easm

volumes:
  easm-results:
  easm-data:
  easm-tls:
  easm-db:
  easm-redis:

networks:
  easm:
    driver: bridge
